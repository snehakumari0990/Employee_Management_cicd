{% extends 'base.html' %}

{% block title %}Add Employee · Empower{% endblock %}

{% block content %}
<div class="form-page">
    <h2>✨ Add New Employee</h2>
    <p class="form-subtitle">Enter the details to add a new team member</p>

    <form method="POST" action="{{ url_for('main.add_employee') }}" class="employee-form">
        <div class="form-group">
            <label for="name">👤 Full Name</label>
            <input type="text" id="name" name="name" required placeholder="e.g. Priya Sharma">
        </div>

        <div class="form-group">
            <label for="email">📧 Email Address</label>
            <input type="email" id="email" name="email" required placeholder="e.g. priya@company.com">
        </div>

        <div class="form-group">
            <label for="department">🏢 Department</label>
            <input type="text" id="department" name="department" required placeholder="e.g. Engineering">
        </div>

        <div class="form-group">
            <label for="position">💼 Position</label>
            <input type="text" id="position" name="position" required placeholder="e.g. Software Engineer">
        </div>

        <div class="form-group">
            <label for="salary">💰 Salary (₹)</label>
            <input type="number" id="salary" name="salary" required
                   min="0" step="1000" placeholder="e.g. 50000">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 Save Employee</button>
            <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
